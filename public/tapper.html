<!DOCTYPE html>
<html>
<head>
  <title>Kassa - Drink Exchange</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
  <div id="login-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <h2>Tapper Login</h2>
    <input type="password" id="pin-input" placeholder="Voer PIN in" style="font-size: 2em; padding: 10px; text-align: center; width: 200px; margin-bottom: 20px;">
    <button onclick="loginTapper()" style="background-color: #3498db; padding: 15px 30px; font-size: 1.2em;">Ontgrendel Kassa</button>
  </div>

  <h1>Kassa Systeem</h1>
  
  <button id="config-toggle" class="config-toggle" onclick="toggleConfigPanel()">⚙️ Config</button>

  <div id="config-overlay" class="config-overlay" onclick="closeConfigPanel(event)">
    <div id="config-panel" class="config-panel">
      <div class="config-header">
        <h2>Prijsautomatisme Instellingen</h2>
        <button class="config-close" onclick="toggleConfigPanel(false)">✕</button>
      </div>

      <div class="config-layout">
        <div class="config-main">
          <label style="display: block; margin-bottom: 10px;">
        <strong>Standaardprijs Water (€)</strong>
        <input type="number" id="config-base-water" step="0.10" min="0" style="width: 100%; padding: 8px; margin-top: 5px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px;">
      </label>
      
      <label style="display: block; margin-bottom: 10px;">
        <strong>Standaardprijs Alcohol (€)</strong>
        <input type="number" id="config-base-alcohol" step="0.10" min="0" style="width: 100%; padding: 8px; margin-top: 5px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px;">
      </label>

      <label style="display: block; margin-bottom: 10px; margin-top: 20px;">
        <strong>Prijsstijging per Verkoop (%)</strong>
        <input type="number" id="config-price-increment" step="0.1" min="0" max="5" style="width: 100%; padding: 8px; margin-top: 5px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px;">
        <small style="color: #999; display: block; margin-top: 5px;">Hoe veel prijzen stijgen na verkoop</small>
      </label>

      <label style="display: block; margin-bottom: 10px;">
        <strong>Prijssprong Bedrag (€)</strong>
        <input type="number" id="config-price-jump-size" step="0.10" min="0.10" max="2.00" style="width: 100%; padding: 8px; margin-top: 5px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px;">
        <small style="color: #999; display: block; margin-top: 5px;">Alleen stappen van 10 cent of meer (0.10, 0.20, ...)</small>
      </label>

      <label style="display: block; margin-bottom: 10px;">
        <strong>Maximale Prijs Multiplier (x)</strong>
        <input type="number" id="config-max-multiplier" step="0.10" min="1" style="width: 100%; padding: 8px; margin-top: 5px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px;">
        <small style="color: #999; display: block; margin-top: 5px;">bijv. 1.50 = max 50% boven standaard</small>
      </label>

      <label style="display: block; margin-bottom: 10px;">
        <strong>Minimale Prijs Multiplier (x)</strong>
        <input type="number" id="config-min-multiplier" step="0.10" min="0" max="1" style="width: 100%; padding: 8px; margin-top: 5px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px;">
        <small style="color: #999; display: block; margin-top: 5px;">bijv. 0.50 = min 50% onder standaard</small>
      </label>

      <label style="display: block; margin-bottom: 20px;">
        <strong>Decay Interval (ms)</strong>
        <input type="number" id="config-decay-interval" step="1000" min="1000" style="width: 100%; padding: 8px; margin-top: 5px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px;">
        <small style="color: #999; display: block; margin-top: 5px;">Hoe vaak prijzen aangepast worden</small>
      </label>

          <button onclick="saveConfigPanel()" class="config-btn save">💾 Opslaan</button>
          <button onclick="resetConfigPanel()" class="config-btn reset">🔄 Resetten</button>
        </div>

        <aside class="config-admin">
          <h3>Admin Acties</h3>
          <button onclick="adminResetPrices()" class="config-btn admin-neutral">🔄 Reset naar Normale Prijzen</button>
          <button onclick="adminPriceJumpUp()" class="config-btn admin-up">⬆️ Prijssprong naar Boven</button>
          <button onclick="adminPriceJumpDown()" class="config-btn admin-down">⬇️ Prijssprong naar Beneden</button>
        </aside>
      </div>
    </div>
  </div>
  
  <div class="tapper-layout">
    
    <div class="pos-grid">
      <button class="pos-btn" onclick="openModal('water', '💧')">💧<br>Water</button>
      <button class="pos-btn" onclick="openModal('frisdrank', '🥤')">🥤<br>Frisdrank</button>
      <button class="pos-btn" onclick="openModal('pintje', '🍺')">🍺<br>Pintje</button>
      <button class="pos-btn" onclick="openModal('kriek', '🍒')">🍒<br>Kriek</button>
      <button class="pos-btn" onclick="openModal('witte wijn', '🥂')">🥂<br>Witte Wijn</button>
      <button class="pos-btn" onclick="openModal('kasteelbier rouge', '🍷')">🍷<br>Kasteelbier</button>
      <button class="pos-btn" onclick="openModal('duvel', '🍻')">🍻<br>Duvel</button>
      <button class="pos-btn" onclick="openModal('trippel karmeliet', '🏺')">🏺<br>Karmeliet</button>
    </div>

    <div class="price-sidebar">
      <h2>Huidige Prijzen</h2>
      <div id="live-price-list">
        Laden...
      </div>
    </div>

  </div>

  <div id="quantity-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2 id="modal-title">Hoeveel?</h2>
      <div class="quantity-controls">
        <button onclick="changeQuantity(-1)" class="qty-btn">-</button>
        <span id="qty-display" style="font-size: 2em; margin: 0 20px;">1</span>
        <button onclick="changeQuantity(1)" class="qty-btn">+</button>
      </div>
      <br>
      <h3 id="modal-total" style="color: #00C851; margin: 15px 0;">Totaal: €0.00</h3>
      <button onclick="confirmOrder()" style="background-color: #00C851; padding: 20px 40px; font-size: 1.5em; width: 100%;">Afrekenen</button>
      <button onclick="closeModal()" style="background-color: #ff4444; width: 100%; margin-top: 10px;">Annuleer</button>
    </div>
  </div>

  <script src="tapper.js"></script>
</body>
</html>
